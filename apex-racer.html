<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX RACER — 3D Racing Game</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --neon-red: #ff2233;
  --neon-yellow: #ffdd00;
  --neon-cyan: #00eeff;
  --dark: #050508;
  --glass: rgba(0,0,0,0.55);
  --glass-border: rgba(255,255,255,0.08);
}

body {
  background: #000;
  overflow: hidden;
  font-family: 'Rajdhani', sans-serif;
  color: #fff;
  user-select: none;
}

#game-canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

/* ─── SCREENS ─── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.4s ease;
}

.screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.screen-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 60%, #1a0005 0%, #000005 70%);
  z-index: -1;
}

.screen-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,34,51,0.03) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,34,51,0.03) 61px);
}

/* ─── START SCREEN ─── */
#start-screen .logo {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(3rem, 10vw, 7rem);
  font-weight: 900;
  letter-spacing: 0.05em;
  line-height: 1;
  text-align: center;
  background: linear-gradient(135deg, #ff2233 0%, #ffdd00 50%, #ff2233 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 40px rgba(255,34,51,0.6));
  margin-bottom: 0.2em;
  animation: logoPulse 3s ease-in-out infinite;
}

@keyframes logoPulse {
  0%, 100% { filter: drop-shadow(0 0 30px rgba(255,34,51,0.5)); }
  50% { filter: drop-shadow(0 0 60px rgba(255,221,0,0.8)); }
}

#start-screen .tagline {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(0.9rem, 2vw, 1.3rem);
  font-weight: 300;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 4rem;
}

.controls-hint {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
  margin-bottom: 3rem;
  width: 240px;
}

.key {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  padding: 0.5rem;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  color: rgba(255,255,255,0.6);
}

.key.active { border-color: var(--neon-red); color: var(--neon-red); }
.key.center { grid-column: 2; }

/* ─── BUTTONS ─── */
.btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 1rem 3rem;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.btn-primary {
  background: linear-gradient(135deg, #ff2233, #cc0011);
  color: #fff;
  box-shadow: 0 0 30px rgba(255,34,51,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 50px rgba(255,34,51,0.7), inset 0 1px 0 rgba(255,255,255,0.2);
}

.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.15);
  margin-top: 1rem;
  font-size: 0.8rem;
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.12);
  color: #fff;
}

/* ─── HUD ─── */
#hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}

#hud.hidden { display: none; }

/* Speedometer */
#speedometer {
  position: absolute;
  bottom: 2rem;
  right: 2rem;
  width: 160px;
  height: 160px;
}

.speedo-ring {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.speedo-ring::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 50%;
  border: 2px solid rgba(255,34,51,0.3);
}

#speed-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.8rem;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  text-shadow: 0 0 20px rgba(255,34,51,0.8);
}

#speed-unit {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  margin-top: 2px;
}

/* Arc progress */
#speedo-arc {
  position: absolute;
  inset: 0;
}

/* Needle pointer */
#speed-needle {
  position: absolute;
  width: 4px;
  height: 80px;
  background: var(--neon-red);
  top: 50%;
  left: 50%;
  transform-origin: bottom center;
  transform: translateX(-50%) translateY(-100%) rotate(-90deg);
  transition: transform 0.1s ease-out;
  pointer-events: none;
}

/* Top HUD bar */
#top-hud {
  position: absolute;
  top: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 2rem;
  align-items: center;
}

.hud-pill {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  border-radius: 100px;
  padding: 0.5rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 90px;
}

.hud-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}

.hud-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.1;
}

.hud-val.highlight { color: var(--neon-yellow); }

/* Position indicator */
#position-display {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.6rem;
  font-weight: 900;
  color: #fff;
}

#position-display sup {
  font-size: 0.7rem;
  color: var(--neon-yellow);
  vertical-align: super;
}

/* Mini map */
#mini-map {
  position: absolute;
  bottom: 2rem;
  left: 2rem;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  overflow: hidden;
}

/* Speed lines overlay */
#speed-lines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(255,255,255,0.03) 100%);
  transition: opacity 0.1s;
}

/* Gear indicator */
#gear-display {
  position: absolute;
  bottom: 2rem;
  right: 11rem;
  font-family: 'Orbitron', sans-serif;
  font-size: 3rem;
  font-weight: 900;
  color: rgba(255,255,255,0.15);
  text-shadow: 0 0 20px rgba(255,34,51,0.3);
  line-height: 1;
}

/* ─── PAUSE MENU ─── */
#pause-menu {
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
}

#pause-menu h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 3rem;
  font-weight: 900;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.9);
  margin-bottom: 3rem;
}

/* ─── FINISH SCREEN ─── */
#finish-screen h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 900;
  color: var(--neon-yellow);
  filter: drop-shadow(0 0 30px rgba(255,221,0,0.6));
  margin-bottom: 1rem;
}

.finish-stats {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 2rem 3rem;
  margin: 2rem 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem 3rem;
  text-align: center;
}

.finish-stat-label {
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}

.finish-stat-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: #fff;
}

/* ─── LOADING ─── */
#loading-screen {
  background: #000;
  z-index: 200;
}

#loading-screen .logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 3rem;
  font-weight: 900;
  color: var(--neon-red);
  margin-bottom: 2rem;
}

.loading-bar-bg {
  width: 300px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.loading-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-red), var(--neon-yellow));
  border-radius: 3px;
  animation: loadFill 1.5s ease forwards;
  box-shadow: 0 0 10px var(--neon-red);
}

@keyframes loadFill {
  from { width: 0%; }
  to { width: 100%; }
}

.loading-text {
  margin-top: 1rem;
  font-size: 0.75rem;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  animation: blink 1s step-end infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* ─── NOTIFICATIONS ─── */
#notification {
  position: fixed;
  top: 5rem;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(255,34,51,0.15);
  border: 1px solid rgba(255,34,51,0.4);
  border-radius: 100px;
  padding: 0.6rem 2rem;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  color: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 60;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

#notification.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── WRONG WAY ─── */
#wrong-way {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Orbitron', sans-serif;
  font-size: 3rem;
  font-weight: 900;
  color: var(--neon-red);
  text-shadow: 0 0 30px rgba(255,34,51,0.8);
  opacity: 0;
  pointer-events: none;
  z-index: 60;
  transition: opacity 0.3s;
  letter-spacing: 0.1em;
  animation: wrongWayPulse 0.5s ease-in-out infinite;
}

#wrong-way.show { opacity: 1; }

@keyframes wrongWayPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ─── COUNTDOWN ─── */
#countdown {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  font-family: 'Orbitron', sans-serif;
  font-size: 12rem;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 60px rgba(255,221,0,0.8);
  opacity: 0;
  pointer-events: none;
  z-index: 70;
  transition: none;
}

#countdown.show {
  opacity: 1;
  animation: countPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes countPop {
  from { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

/* ─── MOBILE CONTROLS ─── */
#mobile-controls {
  display: none;
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 55;
}

@media (max-width: 768px), (pointer: coarse) {
  #mobile-controls {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    gap: 8px;
  }
}

.mobile-btn {
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

.mobile-btn:active, .mobile-btn.pressed {
  background: rgba(255,34,51,0.3);
  border-color: rgba(255,34,51,0.6);
}

.mobile-btn-center { grid-column: 2; }
  </style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div class="screen" id="loading-screen">
  <div class="logo">APEX RACER</div>
  <div class="loading-bar-bg"><div class="loading-bar-fill"></div></div>
  <div class="loading-text">Initializing engine...</div>
</div>

<div class="screen hidden" id="start-screen">
  <div class="screen-bg"></div>
  <div class="logo">APEX RACER</div>
  <div class="tagline">Feel the asphalt · Own the circuit</div>
  <div class="controls-hint">
    <div></div>
    <div class="key active center">W / ↑</div>
    <div></div>
    <div class="key active">A / ←</div>
    <div class="key active">S / ↓</div>
    <div class="key active">D / →</div>
  </div>
  <button class="btn btn-primary" id="btn-start">START RACE</button>
  <br>
  <div style="margin-top:1rem;font-size:0.8rem;letter-spacing:0.2em;color:rgba(255,255,255,0.2)">PRESS P TO PAUSE · ESC TO MENU</div>
</div>

<div id="hud" class="hidden">
  <div id="speed-lines"></div>
  <div id="top-hud">
    <div class="hud-pill">
      <span class="hud-label">Lap</span>
      <span class="hud-val highlight" id="hud-lap">1 / 3</span>
    </div>
    <div class="hud-pill">
      <span class="hud-label">Time</span>
      <span class="hud-val" id="hud-time">0:00.0</span>
    </div>
    <div class="hud-pill">
      <span class="hud-label">Best</span>
      <span class="hud-val" id="hud-best">--:--.--</span>
    </div>
  </div>
  <div id="top-hud" style="top:1.5rem;right:2rem;left:auto;transform:none;position:absolute;">
    <div class="hud-pill">
      <span class="hud-label">Position</span>
      <div id="position-display">1<sup>st</sup></div>
    </div>
  </div>
  <div id="speedometer">
    <div class="speedo-ring">
      <svg id="speedo-arc" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="68" fill="none" stroke="rgba(255,34,51,0.1)" stroke-width="6"/>
        <circle id="speedo-progress" cx="80" cy="80" r="68" fill="none" stroke="url(#speedGrad)"
          stroke-width="6" stroke-linecap="round"
          stroke-dasharray="427" stroke-dashoffset="427"
          transform="rotate(-90 80 80)"/>
        <defs>
          <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff2233"/>
            <stop offset="100%" stop-color="#ffdd00"/>
          </linearGradient>
        </defs>
      </svg>
      <div id="speed-value">0</div>
      <div id="speed-unit">km/h</div>
      <!-- rotating needle added for more realistic speedometer -->
      <div id="speed-needle"></div>
    </div>
  </div>
  <div id="gear-display">N</div>
  <canvas id="mini-map" width="120" height="120"></canvas>
</div>

<div id="countdown"></div>
<div id="notification"></div>
<div id="wrong-way">⚠ WRONG WAY</div>

<div class="screen hidden" id="pause-menu">
  <h2>PAUSED</h2>
  <button class="btn btn-primary" id="btn-resume">RESUME</button>
  <button class="btn btn-secondary" id="btn-restart-pause">RESTART RACE</button>
  <button class="btn btn-secondary" id="btn-menu-pause">MAIN MENU</button>
</div>

<div class="screen hidden" id="finish-screen">
  <div class="screen-bg"></div>
  <h2>RACE FINISHED!</h2>
  <div class="finish-stats">
    <div>
      <div class="finish-stat-label">Position</div>
      <div class="finish-stat-val" id="fin-pos">1st</div>
    </div>
    <div>
      <div class="finish-stat-label">Total Time</div>
      <div class="finish-stat-val" id="fin-time">0:00.0</div>
    </div>
    <div>
      <div class="finish-stat-label">Best Lap</div>
      <div class="finish-stat-val" id="fin-best">--</div>
    </div>
    <div>
      <div class="finish-stat-label">Top Speed</div>
      <div class="finish-stat-val" id="fin-speed">0 km/h</div>
    </div>
  </div>
  <button class="btn btn-primary" id="btn-restart-finish">RACE AGAIN</button>
  <button class="btn btn-secondary" id="btn-menu-finish">MAIN MENU</button>
</div>

<div id="mobile-controls">
  <div></div>
  <div class="mobile-btn mobile-btn-center" id="mb-up" data-key="ArrowUp">▲</div>
  <div></div>
  <div class="mobile-btn" id="mb-left" data-key="ArrowLeft">◀</div>
  <div class="mobile-btn" id="mb-down" data-key="ArrowDown">▼</div>
  <div class="mobile-btn" id="mb-right" data-key="ArrowRight">▶</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  APEX RACER — main.js
//  Three.js r128  |  requestAnimationFrame game loop
// ═══════════════════════════════════════════════════════════

'use strict';

/* ─── CONSTANTS ─── */
const TOTAL_LAPS   = 3;
const NUM_AI       = 4;
const TRACK_RADIUS = 120;     // outer radius of oval base
const TRACK_WIDTH  = 14;
const CAR_LENGTH   = 4.4;
const CAR_WIDTH    = 2.2;
const MAX_SPEED    = 60;      // km/h display units (actual = world units/s × scale)
const WORLD_SCALE  = 0.5;     // world units per "km/h"

/* ─── TRACK PATH (Bezier control points for a figure-8-ish circuit) ─── */
// We'll define waypoints for a smooth closed loop using CatmullRomCurve3
const TRACK_WAYPOINTS = (() => {
  const pts = [];
  const rx = 115, rz = 75;
  const kink = [
    [0,    0,  -rz],
    [rx*0.7, 0, -rz*0.9],
    [rx,   0,   0],
    [rx*0.8,0,  rz*0.7],
    [rx*0.3,0,  rz],
    [0,    0,   rz*0.5],
    [-rx*0.3,0, rz],
    [-rx*0.8,0, rz*0.7],
    [-rx,  0,   0],
    [-rx*0.7,0,-rz*0.9],
  ];
  kink.forEach(p => pts.push(new THREE.Vector3(p[0], p[1], p[2])));
  return pts;
})();

/* ─── GAME STATE ─── */
const State = {
  phase: 'loading', // loading|start|countdown|racing|paused|finished
  lap: 1,
  raceTime: 0,
  lapStartTime: 0,
  bestLap: Infinity,
  topSpeed: 0,
  countdown: 3,
  wrongWay: false,
  started: false,
  finished: false,
  lastNotifTimeout: null,
  boostTriggered: false, // whether boost sound has played for current run
};

/* ─── INPUT ─── */
const Keys = { up:false, down:false, left:false, right:false };

/* ─── AUDIO ─── Web Audio API Synthesis */
let audioCtx = null;
let masterGain = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playBeep() {
  const ac = getAudioCtx();
  if (!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.3, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.08);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(ac.currentTime + 0.1);
}

function playStartSound() {
  const ac = getAudioCtx();
  if (!ac) return;
  [440, 550, 660].forEach((freq, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    const t = ac.currentTime + i * 0.08;
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.25, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.28);
  });
}

function playFinishSound() {
  const ac = getAudioCtx();
  if (!ac) return;
  [880, 1100, 1320, 1760].forEach((freq, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    const t = ac.currentTime + i * 0.1;
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.2, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.45);
  });
}

function playCrashSound() {
  const ac = getAudioCtx();
  if (!ac) return;
  const buf = ac.createBuffer(1, ac.sampleRate * 0.2, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.08));
  }
  const src = ac.createBufferSource();
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 600;
  const gain = ac.createGain();
  gain.gain.value = 0.5;
  src.buffer = buf;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  src.start();
}

function playWrongWaySound() {
  const ac = getAudioCtx();
  if (!ac) return;
  [220, 180].forEach((freq, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    const t = ac.currentTime + i * 0.05;
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.32);
  });
}

function playBoostSound() {
  const ac = getAudioCtx();
  if (!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(600, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, ac.currentTime + 0.15);
  gain.gain.setValueAtTime(0.35, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(ac.currentTime + 0.22);
}

let engineActive = false;
function playEngineLoop() {
  const ac = getAudioCtx();
  if (!ac || engineActive) return;
  engineActive = true;
  const osc1 = ac.createOscillator();
  const osc2 = ac.createOscillator();
  const gain = ac.createGain();
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  osc1.type = 'sawtooth';
  osc1.frequency.value = 120;
  osc2.type = 'triangle';
  osc2.frequency.value = 125;
  gain.gain.value = 0.15;
  osc1.connect(filter);
  osc2.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain);
  osc1.start();
  osc2.start();
  window._audioEngines = { osc1, osc2 };
}

function stopEngineLoop() {
  if (window._audioEngines) {
    window._audioEngines.osc1.stop();
    window._audioEngines.osc2.stop();
    delete window._audioEngines;
    engineActive = false;
  }
}

function playClickSound() {
  const ac = getAudioCtx();
  if (!ac) return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(800, ac.currentTime + 0.05);
  gain.gain.setValueAtTime(0.2, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();
  osc.stop(ac.currentTime + 0.1);
}

const sounds = {
  beep: { play: playBeep },
  start: { play: playStartSound },
  finish: { play: playFinishSound },
  crash: { play: playCrashSound, currentTime: 0 },
  wrong: { play: playWrongWaySound, currentTime: 0 },
  boost: { play: playBoostSound },
  engine: {
    play: playEngineLoop,
    pause: stopEngineLoop,
    get paused() { return !engineActive; },
    currentTime: 0
  },
  click: { play: playClickSound }
};

/* ──────────────────────────────────────────────────────────
   TRACK CURVE
────────────────────────────────────────────────────────── */
const trackCurve = new THREE.CatmullRomCurve3(TRACK_WAYPOINTS, true, 'centripetal', 0.5);
const TRACK_DIVISIONS = 400;
const trackPoints  = trackCurve.getPoints(TRACK_DIVISIONS);
const trackLengths = trackCurve.getLengths(TRACK_DIVISIONS);
const totalLength  = trackLengths[trackLengths.length - 1];

/* ──────────────────────────────────────────────────────────
   BUILD SCENE
────────────────────────────────────────────────────────── */
function buildScene() {
  /* Sky */
  scene.background = new THREE.Color(0x0a0a1a);
  const skyGeo = new THREE.SphereGeometry(1400, 32, 16);
  const skyMat = new THREE.MeshBasicMaterial({
    color: 0x0a0a1a,
    side: THREE.BackSide,
  });
  // Gradient via vertex colors
  const skyMesh = new THREE.Mesh(skyGeo, skyMat);
  scene.add(skyMesh);

  /* Fog */
  scene.fog = new THREE.Fog(0x0a0a1a, 200, 600);

  /* Ambient */
  const ambient = new THREE.AmbientLight(0x334466, 0.8);
  scene.add(ambient);

  /* Sun / main directional */
  const sun = new THREE.DirectionalLight(0xfff0e0, 1.4);
  sun.position.set(80, 120, 60);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far  = 500;
  sun.shadow.camera.left = sun.shadow.camera.bottom = -200;
  sun.shadow.camera.right = sun.shadow.camera.top = 200;
  scene.add(sun);

  /* Fill light */
  const fill = new THREE.DirectionalLight(0x4466aa, 0.3);
  fill.position.set(-80, 40, -60);
  scene.add(fill);

  /* Stars */
  const starGeo = new THREE.BufferGeometry();
  const starVerts = [];
  for (let i = 0; i < 3000; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r = 900 + Math.random() * 400;
    starVerts.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi),
      r * Math.sin(phi) * Math.sin(theta)
    );
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true })));

  /* Ground plane */
  const groundGeo = new THREE.PlaneGeometry(900, 900, 60, 60);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a3d0a });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.05;
  ground.receiveShadow = true;
  scene.add(ground);

  /* Track surface */
  buildTrackMesh();

  /* Track markings */
  buildTrackMarkings();

  /* Barriers */
  buildBarriers();

  /* Environment */
  buildEnvironment();
}

/* ─── TRACK MESH ─── */
function buildTrackMesh() {
  const shape    = new THREE.Shape();
  const frames   = trackCurve.computeFrenetFrames(TRACK_DIVISIONS, true);
  const positions = [];
  const normals   = [];
  const uvs       = [];
  const indices   = [];

  const w = TRACK_WIDTH / 2;

  for (let i = 0; i <= TRACK_DIVISIONS; i++) {
    const t = i / TRACK_DIVISIONS;
    const pt   = trackCurve.getPointAt(t);
    const norm = frames.normals[i % (TRACK_DIVISIONS)];
    const binorm = frames.binormals[i % TRACK_DIVISIONS];

    // Left edge
    positions.push(pt.x - binorm.x * w, pt.y + 0.01, pt.z - binorm.z * w);
    normals.push(0, 1, 0);
    uvs.push(0, i / 20);

    // Right edge
    positions.push(pt.x + binorm.x * w, pt.y + 0.01, pt.z + binorm.z * w);
    normals.push(0, 1, 0);
    uvs.push(1, i / 20);
  }

  for (let i = 0; i < TRACK_DIVISIONS; i++) {
    const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
    indices.push(a, b, c);
    indices.push(b, d, c);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals,   3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,       2));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  // Tarmac texture (procedural via canvas)
  const tarmacCanvas = document.createElement('canvas');
  tarmacCanvas.width = tarmacCanvas.height = 256;
  const ctx = tarmacCanvas.getContext('2d');
  ctx.fillStyle = '#1a1a1e';
  ctx.fillRect(0, 0, 256, 256);
  // Noise for texture
  for (let i = 0; i < 8000; i++) {
    const x = Math.random() * 256, y = Math.random() * 256;
    const g = Math.floor(Math.random() * 30 + 20);
    ctx.fillStyle = `rgb(${g},${g},${g})`;
    ctx.fillRect(x, y, 2, 2);
  }
  const tarmacTex = new THREE.CanvasTexture(tarmacCanvas);
  tarmacTex.wrapS = tarmacTex.wrapT = THREE.RepeatWrapping;
  tarmacTex.repeat.set(1, 6);

  const mat = new THREE.MeshLambertMaterial({ map: tarmacTex });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  mesh.castShadow    = false;
  scene.add(mesh);
  scene.userData.trackMesh = mesh;
  scene.userData.trackGeo  = { positions, indices };
}

/* ─── TRACK MARKINGS (dashed center line) ─── */
function buildTrackMarkings() {
  const frames = trackCurve.computeFrenetFrames(TRACK_DIVISIONS, true);
  // Start/finish line
  const pt0   = trackCurve.getPointAt(0);
  const bn0   = frames.binormals[0];
  const sfGeo = new THREE.BoxGeometry(TRACK_WIDTH, 0.05, 0.8);
  const sfMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const sf    = new THREE.Mesh(sfGeo, sfMat);
  sf.position.set(pt0.x, pt0.y + 0.02, pt0.z);
  sf.lookAt(pt0.x + bn0.x, pt0.y, pt0.z + bn0.z);
  scene.add(sf);
  scene.userData.startFinishPos = pt0.clone();

  // Dashed center line
  for (let i = 0; i < TRACK_DIVISIONS; i += 8) {
    const t  = i / TRACK_DIVISIONS;
    const pt = trackCurve.getPointAt(t);
    const dashGeo = new THREE.BoxGeometry(0.25, 0.04, 2.5);
    const dashMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true });
    const dash = new THREE.Mesh(dashGeo, dashMat);
    const bn   = frames.binormals[i];
    dash.position.set(pt.x, pt.y + 0.02, pt.z);
    dash.lookAt(pt.x + bn.x, pt.y + 0.02, pt.z + bn.z);
    scene.add(dash);
  }

  // Kerbs (red/white) at edges
  for (let i = 0; i < TRACK_DIVISIONS; i += 3) {
    const t  = i / TRACK_DIVISIONS;
    const pt = trackCurve.getPointAt(t);
    const bn = frames.binormals[i];
    const w  = TRACK_WIDTH / 2 + 0.5;
    for (const side of [-1, 1]) {
      const kGeo = new THREE.BoxGeometry(1.2, 0.1, 1.5);
      const kMat = new THREE.MeshLambertMaterial({ color: (i % 6 < 3) ? 0xff2222 : 0xeeeeee });
      const k = new THREE.Mesh(kGeo, kMat);
      k.position.set(pt.x + bn.x * w * side, pt.y + 0.01, pt.z + bn.z * w * side);
      k.lookAt(pt.x + bn.x*(w+1)*side, pt.y+0.01, pt.z+bn.z*(w+1)*side);
      k.receiveShadow = true;
      scene.add(k);
    }
  }
}

/* ─── BARRIERS ─── */
function buildBarriers() {
  const frames = trackCurve.computeFrenetFrames(TRACK_DIVISIONS, true);
  const sides  = [-1, 1];
  const bw     = TRACK_WIDTH / 2 + 1.8;

  for (let i = 0; i < TRACK_DIVISIONS; i += 2) {
    const t  = i / TRACK_DIVISIONS;
    const pt = trackCurve.getPointAt(t);
    const bn = frames.binormals[i % TRACK_DIVISIONS];

    for (const side of sides) {
      const bGeo = new THREE.BoxGeometry(0.4, 0.7, 2.2);
      const bMat = new THREE.MeshLambertMaterial({
        color: (i % 4 < 2) ? 0xee2222 : 0xeeeeee
      });
      const b = new THREE.Mesh(bGeo, bMat);
      b.position.set(pt.x + bn.x * bw * side, pt.y + 0.35, pt.z + bn.z * bw * side);
      b.lookAt(pt.x + bn.x*(bw+1)*side, pt.y+0.35, pt.z + bn.z*(bw+1)*side);
      b.castShadow = b.receiveShadow = true;
      scene.add(b);
    }
  }
}

/* ─── ENVIRONMENT ─── */
function buildEnvironment() {
  const rng = mulberry32(42);

  // Trees (low-poly billboards)
  for (let i = 0; i < 200; i++) {
    const angle = rng() * Math.PI * 2;
    const r = 50 + rng() * 250;
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    if (isOnTrack(x, z)) continue;
    addTree(x, 0, z, rng);
  }

  // Mountains (distant)
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2;
    const r = 350 + Math.random() * 150;
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    const h = 60 + Math.random() * 80;
    const mGeo = new THREE.ConeGeometry(60 + Math.random() * 40, h, 5 + Math.floor(Math.random()*4));
    const mMat = new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(0.6, 0.1, 0.15 + Math.random()*0.1) });
    const m = new THREE.Mesh(mGeo, mMat);
    m.position.set(x, h/2 - 5, z);
    m.castShadow = true;
    scene.add(m);
    // Snow cap
    const capGeo = new THREE.ConeGeometry(18 + Math.random()*10, h * 0.3, 5);
    const capMat = new THREE.MeshLambertMaterial({ color: 0xddeeff });
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.set(x, h - 5, z);
    scene.add(cap);
  }

  // Grandstands
  addGrandstand(-40, 0, 60, 0);
  addGrandstand( 40, 0, 60, Math.PI);

  // Pit lane signs
  addPitSign(TRACK_WAYPOINTS[0].x, TRACK_WAYPOINTS[0].z);
}

function isOnTrack(x, z) {
  // Approximate check using closest point on curve
  const closest = trackCurve.getPoint(getClosestT(new THREE.Vector3(x, 0, z)));
  const dx = x - closest.x, dz = z - closest.z;
  return Math.sqrt(dx*dx + dz*dz) < TRACK_WIDTH;
}

function addTree(x, y, z, rng) {
  const h  = 4 + rng() * 6;
  const group = new THREE.Group();
  // Trunk
  const trunkGeo = new THREE.CylinderGeometry(0.18, 0.28, h * 0.5, 6);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5c3d1a });
  group.add(new THREE.Mesh(trunkGeo, trunkMat));
  // Foliage layers
  const greens = [0x1a6b2a, 0x1e7d30, 0x237a28];
  for (let j = 0; j < 3; j++) {
    const fGeo = new THREE.ConeGeometry(h * (0.35 - j * 0.08), h * (0.45 - j * 0.1), 7);
    const fMat = new THREE.MeshLambertMaterial({ color: greens[j] });
    const f = new THREE.Mesh(fGeo, fMat);
    f.position.y = h * 0.3 + j * h * 0.15;
    f.castShadow = true;
    group.add(f);
  }
  group.position.set(x, y, z);
  group.rotation.y = rng() * Math.PI * 2;
  scene.add(group);
}

function addGrandstand(x, y, z, ry) {
  const g = new THREE.Group();
  // Base
  const base = new THREE.Mesh(
    new THREE.BoxGeometry(30, 5, 8),
    new THREE.MeshLambertMaterial({ color: 0xcccccc })
  );
  base.position.y = 2.5;
  base.castShadow = base.receiveShadow = true;
  g.add(base);
  // Roof
  const roof = new THREE.Mesh(
    new THREE.BoxGeometry(32, 0.4, 9),
    new THREE.MeshLambertMaterial({ color: 0x222255 })
  );
  roof.position.y = 6;
  g.add(roof);
  // Seats (colored blocks)
  for (let i = 0; i < 20; i++) {
    for (let j = 0; j < 4; j++) {
      const s = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 0.8, 1.2),
        new THREE.MeshLambertMaterial({ color: [0xff2233, 0x2255cc, 0xffdd00, 0x22cc44][Math.floor(Math.random()*4)] })
      );
      s.position.set(-14 + i * 1.5, 1 + j * 1.3, -1 + j * 0.6);
      g.add(s);
    }
  }
  g.position.set(x, y, z);
  g.rotation.y = ry;
  scene.add(g);
}

function addPitSign(x, z) {
  const sg = new THREE.Group();
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.1, 6, 8),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
  );
  sg.add(pole);
  const sign = new THREE.Mesh(
    new THREE.BoxGeometry(4, 1.5, 0.1),
    new THREE.MeshLambertMaterial({ color: 0xff2233 })
  );
  sign.position.y = 3.5;
  sg.add(sign);
  sg.position.set(x + 12, 0, z);
  scene.add(sg);
}

/* ──────────────────────────────────────────────────────────
   CAR BUILDER
────────────────────────────────────────────────────────── */
function buildCar(color, isPlayer) {
  const group = new THREE.Group();

  const bodyMat   = new THREE.MeshLambertMaterial({ color });
  const darkMat   = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const chromeMat = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
  const glassMat  = new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.5 });
  const tireMat   = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const rimMat    = new THREE.MeshLambertMaterial({ color: 0xdddddd });

  // Body
  const bodyGeo = new THREE.BoxGeometry(CAR_WIDTH, 0.55, CAR_LENGTH);
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.38;
  body.castShadow = true;
  group.add(body);

  // Cabin / cockpit
  const cabinGeo = new THREE.BoxGeometry(CAR_WIDTH * 0.65, 0.5, CAR_LENGTH * 0.45);
  const cabin = new THREE.Mesh(cabinGeo, bodyMat);
  cabin.position.set(0, 0.88, 0.1);
  cabin.castShadow = true;
  group.add(cabin);

  // Windshield
  const wsGeo = new THREE.BoxGeometry(CAR_WIDTH * 0.62, 0.46, 0.08);
  const ws = new THREE.Mesh(wsGeo, glassMat);
  ws.position.set(0, 0.88, CAR_LENGTH * 0.22);
  ws.rotation.x = 0.3;
  group.add(ws);

  // Rear spoiler
  const spoilerGeo = new THREE.BoxGeometry(CAR_WIDTH * 0.9, 0.08, 0.9);
  const spoiler = new THREE.Mesh(spoilerGeo, darkMat);
  spoiler.position.set(0, 0.85, -CAR_LENGTH * 0.45);
  group.add(spoiler);
  const spStand1 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.4, 0.08), darkMat);
  spStand1.position.set(CAR_WIDTH * 0.3, 0.65, -CAR_LENGTH * 0.45);
  group.add(spStand1);
  const spStand2 = spStand1.clone();
  spStand2.position.x = -CAR_WIDTH * 0.3;
  group.add(spStand2);

  // Nose
  const noseGeo = new THREE.BoxGeometry(CAR_WIDTH * 0.5, 0.2, 0.8);
  const nose = new THREE.Mesh(noseGeo, bodyMat);
  nose.position.set(0, 0.18, CAR_LENGTH * 0.5 + 0.35);
  group.add(nose);

  // Headlights
  const hlMat = new THREE.MeshBasicMaterial({ color: isPlayer ? 0xffffcc : 0xffddaa });
  for (const sx of [-0.7, 0.7]) {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.18, 0.08), hlMat);
    hl.position.set(sx, 0.38, CAR_LENGTH * 0.5 + 0.05);
    group.add(hl);
  }

  // Wheels (4)
  const wheelGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.32, 12);
  const rimGeo   = new THREE.CylinderGeometry(0.22, 0.22, 0.34, 8);
  wheelGeo.rotateZ(Math.PI / 2);
  rimGeo.rotateZ(Math.PI / 2);

  const wheelPositions = [
    [-CAR_WIDTH/2 - 0.18,  0.36,  CAR_LENGTH * 0.32],
    [ CAR_WIDTH/2 + 0.18,  0.36,  CAR_LENGTH * 0.32],
    [-CAR_WIDTH/2 - 0.18,  0.36, -CAR_LENGTH * 0.32],
    [ CAR_WIDTH/2 + 0.18,  0.36, -CAR_LENGTH * 0.32],
  ];
  group.userData.wheels = [];
  wheelPositions.forEach((pos, idx) => {
    const wGroup = new THREE.Group();
    const tire = new THREE.Mesh(wheelGeo, tireMat);
    const rim  = new THREE.Mesh(rimGeo,   rimMat);
    tire.castShadow = true;
    wGroup.add(tire);
    wGroup.add(rim);
    wGroup.position.set(...pos);
    group.add(wGroup);
    group.userData.wheels.push(wGroup);
  });

  // Shadow under car
  if (isPlayer) {
    const shadowGeo = new THREE.PlaneGeometry(CAR_WIDTH * 2, CAR_LENGTH * 1.2);
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 });
    const shadow = new THREE.Mesh(shadowGeo, shadowMat);
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = -0.35;
    group.add(shadow);
  }

  // Exhaust particles
  group.userData.exhaustL = new THREE.Vector3(-0.4, 0.1, -CAR_LENGTH * 0.5);
  group.userData.exhaustR = new THREE.Vector3( 0.4, 0.1, -CAR_LENGTH * 0.5);

  return group;
}

/* ──────────────────────────────────────────────────────────
   PARTICLES
────────────────────────────────────────────────────────── */
class ParticleSystem {
  constructor(count, size, color) {
    this.geo = new THREE.BufferGeometry();
    this.count = count;
    this.positions = new Float32Array(count * 3);
    this.velocities = new Float32Array(count * 3);
    this.lifetimes  = new Float32Array(count);
    this.geo.setAttribute('position', new THREE.BufferAttribute(this.positions, 3));
    this.mat = new THREE.PointsMaterial({ color, size, sizeAttenuation: true, transparent: true, opacity: 0.7, depthWrite: false });
    this.mesh = new THREE.Points(this.geo, this.mat);
    this.mesh.frustumCulled = false;
    scene.add(this.mesh);
    this.activeCount = 0;
    // pool tail pointer
    this.next = 0;
  }

  emit(pos, vel, life) {
    const i = this.next;
    this.positions[i*3  ] = pos.x;
    this.positions[i*3+1] = pos.y;
    this.positions[i*3+2] = pos.z;
    this.velocities[i*3  ] = vel.x;
    this.velocities[i*3+1] = vel.y;
    this.velocities[i*3+2] = vel.z;
    this.lifetimes[i] = life;
    this.next = (i + 1) % this.count;
    this.activeCount = Math.min(this.activeCount + 1, this.count);
  }

  update(dt) {
    for (let i = 0; i < this.count; i++) {
      if (this.lifetimes[i] <= 0) continue;
      this.lifetimes[i] -= dt;
      this.positions[i*3  ] += this.velocities[i*3  ] * dt;
      this.positions[i*3+1] += this.velocities[i*3+1] * dt;
      this.positions[i*3+2] += this.velocities[i*3+2] * dt;
      this.velocities[i*3+1] -= 2 * dt; // gravity
      if (this.lifetimes[i] <= 0) {
        this.positions[i*3+1] = -9999; // hide
      }
    }
    this.geo.attributes.position.needsUpdate = true;
  }
}

/* ──────────────────────────────────────────────────────────
   PLAYER CAR
────────────────────────────────────────────────────────── */
const Player = {
  car: null,
  speed: 0,       // world units per second
  angle: 0,       // yaw in radians
  steer: 0,
  t: 0,           // normalized position on curve [0,1]
  lap: 1,
  lastT: 0,
  crossed: false,
  init() {
    this.car = buildCar(0xff2233, true);
    const startPt = trackCurve.getPointAt(0);
    const tan = trackCurve.getTangentAt(0);
    this.car.position.set(startPt.x - 3, 0.01, startPt.z);
    this.angle = Math.atan2(tan.x, tan.z);
    this.car.rotation.y = this.angle;
    scene.add(this.car);
  },
  get kmh() {
    return Math.abs(this.speed) / WORLD_SCALE * 3.6;
  }
};

/* ──────────────────────────────────────────────────────────
   AI CARS
────────────────────────────────────────────────────────── */
const AI_COLORS = [0x2255ff, 0x22cc44, 0xffdd00, 0xff6600];

const AICars = [];
function initAI() {
  const frames = trackCurve.computeFrenetFrames(TRACK_DIVISIONS, true);
  for (let i = 0; i < NUM_AI; i++) {
    const car = buildCar(AI_COLORS[i], false);
    const startT = (i + 1) / (NUM_AI + 1) * 0.05;
    const pt = trackCurve.getPointAt(startT);
    const bn = frames.binormals[0];
    const tan = trackCurve.getTangentAt(startT);
    const offset = (i % 2 === 0 ? 1 : -1) * (3 + Math.floor(i/2) * 2);
    car.position.set(pt.x + bn.x * offset, 0.01, pt.z + bn.z * offset);
    const angle = Math.atan2(tan.x, tan.z);
    car.rotation.y = angle;
    scene.add(car);
    AICars.push({
      car,
      t: startT,
      speed: (0.06 + Math.random() * 0.04) * WORLD_SCALE,  // base speed
      targetSpeed: 0.09 * WORLD_SCALE,
      angle,
      lap: 1,
      offset: offset * 0.5,
      reactDelay: Math.random() * 0.5,
    });
  }
}

/* ──────────────────────────────────────────────────────────
   CAMERA
────────────────────────────────────────────────────────── */
const camTarget = new THREE.Vector3();
const camOffset = new THREE.Vector3(0, 5, -12);

function updateCamera(dt) {
  const speed = Math.abs(Player.speed);
  const fovTarget = 60 + speed / WORLD_SCALE * 0.1;
  camera.fov += (fovTarget - camera.fov) * 3 * dt;
  camera.updateProjectionMatrix();

  // Compute desired camera position
  const carPos = Player.car.position;
  const carQuat = Player.car.quaternion;
  const localOff = camOffset.clone();
  const worldOff = localOff.applyQuaternion(carQuat);

  // Extra zoom-out at speed
  const speedFactor = 1 + speed / (MAX_SPEED * WORLD_SCALE) * 0.3;
  worldOff.multiplyScalar(speedFactor);

  const targetPos = carPos.clone().add(worldOff);
  targetPos.y = Math.max(targetPos.y, carPos.y + 2);

  // Smooth follow
  camera.position.lerp(targetPos, 8 * dt);

  // Look at point slightly ahead of car
  const lookDir = new THREE.Vector3(Math.sin(Player.angle), 0, Math.cos(Player.angle));
  camTarget.copy(carPos).addScaledVector(lookDir, 6);
  camTarget.y = carPos.y + 1.2;
  camera.lookAt(camTarget);
}

/* ──────────────────────────────────────────────────────────
   PHYSICS UPDATE
────────────────────────────────────────────────────────── */
const tmpVec3 = new THREE.Vector3();

function updatePlayer(dt) {
  if (State.phase !== 'racing') return;

  const maxSpeed  = MAX_SPEED * WORLD_SCALE / 3.6;  // m/s
  const accel     = 14 * WORLD_SCALE;
  const brakeAcc  = 22 * WORLD_SCALE;
  const friction  = 6  * WORLD_SCALE;
  const maxSteer  = 1.6;
  const steerSpeed = 4.0;

  // Acceleration
  if (Keys.up) {
    Player.speed += accel * dt;
  } else if (Keys.down) {
    if (Player.speed > 0.1) Player.speed -= brakeAcc * dt;
    else Player.speed -= accel * 0.5 * dt;
  } else {
    // Friction
    const sign = Math.sign(Player.speed);
    Player.speed -= sign * friction * dt;
    if (Math.abs(Player.speed) < 0.05) Player.speed = 0;
  }

  Player.speed = Math.max(-maxSpeed * 0.4, Math.min(maxSpeed, Player.speed));

  // Steering
  const steerInput = (Keys.left ? 1 : 0) - (Keys.right ? 1 : 0);
  const steerTarget = steerInput * maxSteer;
  Player.steer += (steerTarget - Player.steer) * steerSpeed * dt;

  // Apply steering only when moving
  const speedRatio = Math.abs(Player.speed) / maxSpeed;
  const steerAmt   = Player.steer * speedRatio * dt * (Player.speed < 0 ? -1 : 1);
  Player.angle    += steerAmt;

  // Move
  Player.car.position.x += Math.sin(Player.angle) * Player.speed * dt;
  Player.car.position.z += Math.cos(Player.angle) * Player.speed * dt;
  Player.car.rotation.y  = Player.angle;

  // Body roll
  Player.car.rotation.z = Player.steer * speedRatio * -0.06;

  // Wheel spin
  const spinRate = Player.speed * dt * 2;
  if (Player.car.userData.wheels) {
    Player.car.userData.wheels.forEach((w, i) => {
      w.children[0].rotation.x += spinRate;
      w.children[1].rotation.x += spinRate;
      // Front wheel steer
      if (i < 2) w.rotation.y = Player.steer * 0.4;
    });
  }

  // Ground clamping
  Player.car.position.y = 0.01;

  // Track boundary check
  const closestPt = trackCurve.getPoint(getClosestT(Player.car.position));
  const dist = Player.car.position.distanceTo(closestPt);
  if (dist > TRACK_WIDTH / 2 + 1) {
    // Push back
    const dir = new THREE.Vector3().subVectors(Player.car.position, closestPt).normalize();
    Player.car.position.copy(closestPt).addScaledVector(dir, TRACK_WIDTH / 2 * 0.9);
    Player.speed *= 0.4; // bounce slow-down
    if (sounds.crash) { sounds.crash.currentTime = 0; sounds.crash.play(); }
  }

  // Track t-position
  Player.t = getClosestT(Player.car.position);

  // Lap detection
  const crossZone = 0.015;
  if (Player.lastT > 0.97 && Player.t < crossZone) {
    // Crossed finish line forward
    if (Player.lap <= TOTAL_LAPS) {
      const lapTime = State.raceTime - State.lapStartTime;
      if (lapTime < State.bestLap) {
        State.bestLap = lapTime;
        updateHUDBest();
      }
      State.lapStartTime = State.raceTime;
      if (Player.lap < TOTAL_LAPS) {
        Player.lap++;
        showNotification(`LAP ${Player.lap} / ${TOTAL_LAPS}`);
      } else {
        // Race finished
        finishRace();
      }
    }
  } else if (Player.lastT < crossZone && Player.t > 0.97) {
    // Wrong way
    if (!State.wrongWay) {
      if (sounds.wrong) { sounds.wrong.currentTime = 0; sounds.wrong.play(); }
    }
    State.wrongWay = true;
  } else {
    State.wrongWay = false;
  }
  Player.lastT = Player.t;

  // AI collision (simple bump)
  AICars.forEach(ai => {
    const d = Player.car.position.distanceTo(ai.car.position);
    if (d < 3.5) {
      const push = new THREE.Vector3().subVectors(Player.car.position, ai.car.position).normalize();
      Player.car.position.addScaledVector(push, (3.5 - d) * 0.5);
      Player.speed *= 0.7;
      if (sounds.crash) { sounds.crash.currentTime = 0; sounds.crash.play(); }
    }
  });

  // Top speed record
  if (Player.kmh > State.topSpeed) State.topSpeed = Player.kmh;
}

function updateAI(dt) {
  if (State.phase !== 'racing') return;
  const frames = trackCurve.computeFrenetFrames(TRACK_DIVISIONS, true);

  AICars.forEach(ai => {
    // Random speed variation
    ai.reactDelay -= dt;
    if (ai.reactDelay <= 0) {
      ai.targetSpeed = (0.07 + Math.random() * 0.05) * WORLD_SCALE;
      ai.reactDelay = 1 + Math.random() * 2;
    }
    ai.speed += (ai.targetSpeed - ai.speed) * 1.5 * dt;
    ai.t = (ai.t + ai.speed * dt / totalLength * 10) % 1;

    const pt  = trackCurve.getPointAt(ai.t);
    const tan = trackCurve.getTangentAt(ai.t);
    const idx = Math.floor(ai.t * TRACK_DIVISIONS);
    const bn  = frames.binormals[idx % TRACK_DIVISIONS];

    ai.car.position.set(
      pt.x + bn.x * ai.offset,
      0.01,
      pt.z + bn.z * ai.offset
    );
    ai.angle = Math.atan2(tan.x, tan.z);
    ai.car.rotation.y = ai.angle;

    // Wheel spin
    const spinRate = ai.speed * dt * 5;
    if (ai.car.userData.wheels) {
      ai.car.userData.wheels.forEach(w => {
        w.children[0].rotation.x += spinRate;
        w.children[1].rotation.x += spinRate;
      });
    }
  });
}

/* ──────────────────────────────────────────────────────────
   RACE POSITION CALC
────────────────────────────────────────────────────────── */
function calcPosition() {
  const playerProgress = Player.lap * 1000 + Player.t;
  let pos = 1;
  AICars.forEach(ai => {
    const aiProgress = ai.lap * 1000 + ai.t;
    if (aiProgress > playerProgress) pos++;
  });
  return pos;
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

/* ──────────────────────────────────────────────────────────
   PARTICLE UPDATES
────────────────────────────────────────────────────────── */
let exhaustParticles, smokeParticles;

function initParticles() {
  exhaustParticles = new ParticleSystem(500, 0.4, 0x666666);
  smokeParticles   = new ParticleSystem(300, 1.5, 0xdddddd);
}

function updateParticles(dt) {
  exhaustParticles.update(dt);
  smokeParticles.update(dt);

  if (State.phase !== 'racing') return;

  // Exhaust when accelerating
  if (Keys.up && Math.abs(Player.speed) > 0.5) {
    const wpos = Player.car.localToWorld(Player.car.userData.exhaustL.clone());
    const wpos2 = Player.car.localToWorld(Player.car.userData.exhaustR.clone());
    for (const wp of [wpos, wpos2]) {
      exhaustParticles.emit(wp, new THREE.Vector3(
        (Math.random()-0.5) * 0.5 - Math.sin(Player.angle) * 2,
        0.3 + Math.random() * 0.5,
        (Math.random()-0.5) * 0.5 - Math.cos(Player.angle) * 2
      ), 0.4 + Math.random() * 0.3);
    }
  }

  // Tire smoke when drifting
  const drift = Math.abs(Player.steer) > 0.8 && Math.abs(Player.speed) > MAX_SPEED * WORLD_SCALE / 3.6 * 0.5;
  if (drift) {
    const rearL = Player.car.localToWorld(new THREE.Vector3(-CAR_WIDTH/2, 0.1, -CAR_LENGTH*0.32));
    const rearR = Player.car.localToWorld(new THREE.Vector3( CAR_WIDTH/2, 0.1, -CAR_LENGTH*0.32));
    for (const wp of [rearL, rearR]) {
      smokeParticles.emit(wp, new THREE.Vector3(
        (Math.random()-0.5) * 2,
        0.5 + Math.random(),
        (Math.random()-0.5) * 2
      ), 0.6 + Math.random() * 0.5);
    }
  }
}

/* ──────────────────────────────────────────────────────────
   HUD UPDATES
────────────────────────────────────────────────────────── */
const speedValue    = document.getElementById('speed-value');
const speedProgress = document.getElementById('speedo-progress');
const hudLap        = document.getElementById('hud-lap');
const hudTime       = document.getElementById('hud-time');
const hudBest       = document.getElementById('hud-best');
const posDisplay    = document.getElementById('position-display');
const gearDisplay   = document.getElementById('gear-display');
const speedLines    = document.getElementById('speed-lines');
const wrongWayEl    = document.getElementById('wrong-way');
const miniMapCtx    = document.getElementById('mini-map').getContext('2d');

const SPEEDO_CIRC = 2 * Math.PI * 68; // 427

function updateHUD() {
  const kmh = Math.round(Player.kmh);
  speedValue.textContent = kmh;

  // Arc
  const ratio = kmh / MAX_SPEED;
  speedProgress.style.strokeDashoffset = SPEEDO_CIRC * (1 - Math.min(ratio, 1));

  // rotating needle (−90° to +90°)
  const needle = document.getElementById('speed-needle');
  if (needle) {
    needle.style.transform = `translateX(-50%) translateY(-100%) rotate(${ -90 + ratio*180 }deg)`;
  }

  // engine sound start/stop
  if (State.phase === 'racing' && !engineActive) {
    playEngineLoop();
  }
  if (State.phase !== 'racing' && engineActive) {
    stopEngineLoop();
  }

  // boost sound when crossing 90% of max speed
  if (ratio > 0.9) {
    if (!State.boostTriggered && sounds.boost) {
      sounds.boost.currentTime = 0;
      sounds.boost.play();
      State.boostTriggered = true;
    }
  } else {
    State.boostTriggered = false;
  }

  // Gear
  const g = kmh < 5 ? 'N' : kmh < 25 ? '1' : kmh < 45 ? '2' : kmh < 70 ? '3' : kmh < 100 ? '4' : '5';
  gearDisplay.textContent = g;

  // Time
  hudTime.textContent = formatTime(State.raceTime);

  // Lap
  hudLap.textContent = `${Math.min(Player.lap, TOTAL_LAPS)} / ${TOTAL_LAPS}`;

  // Position
  const pos = calcPosition();
  posDisplay.innerHTML = `${pos}<sup>${['','st','nd','rd'][pos] || 'th'}</sup>`;

  // Speed lines overlay
  speedLines.style.opacity = Math.max(0, (ratio - 0.6) * 2.5);

  // Wrong way
  wrongWayEl.classList.toggle('show', State.wrongWay);

  // Mini map
  drawMiniMap();
}

function updateHUDBest() {
  hudBest.textContent = formatTime(State.bestLap);
}

function drawMiniMap() {
  const ctx = miniMapCtx;
  const W = 120, H = 120;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Track outline
  ctx.beginPath();
  const bounds = { minX: -130, maxX: 130, minZ: -90, maxZ: 90 };
  const toMap = (x, z) => ({
    mx: ((x - bounds.minX) / (bounds.maxX - bounds.minX)) * (W - 10) + 5,
    my: ((z - bounds.minZ) / (bounds.maxZ - bounds.minZ)) * (H - 10) + 5,
  });
  trackPoints.forEach((pt, i) => {
    const { mx, my } = toMap(pt.x, pt.z);
    if (i === 0) ctx.moveTo(mx, my); else ctx.lineTo(mx, my);
  });
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 4;
  ctx.stroke();

  // AI dots
  AICars.forEach((ai, i) => {
    const { mx, my } = toMap(ai.car.position.x, ai.car.position.z);
    ctx.beginPath();
    ctx.arc(mx, my, 3, 0, Math.PI * 2);
    ctx.fillStyle = `#${AI_COLORS[i].toString(16).padStart(6,'0')}`;
    ctx.fill();
  });

  // Player dot
  const { mx, my } = toMap(Player.car.position.x, Player.car.position.z);
  ctx.beginPath();
  ctx.arc(mx, my, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#ff2233';
  ctx.fill();
  // Direction
  ctx.beginPath();
  ctx.moveTo(mx, my);
  ctx.lineTo(mx + Math.sin(Player.angle) * 7, my + Math.cos(Player.angle) * 7);
  ctx.strokeStyle = '#ff2233';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function formatTime(t) {
  const m  = Math.floor(t / 60);
  const s  = Math.floor(t % 60);
  const ms = Math.floor((t % 1) * 10);
  return `${m}:${s.toString().padStart(2,'0')}.${ms}`;
}

function formatTimeFull(t) {
  if (t === Infinity) return '--:--.--';
  const m  = Math.floor(t / 60);
  const s  = Math.floor(t % 60);
  const ms = Math.floor((t % 1) * 100);
  return `${m}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
}

/* ──────────────────────────────────────────────────────────
   NOTIFICATIONS
────────────────────────────────────────────────────────── */
const notifEl = document.getElementById('notification');

function showNotification(text, duration = 2000) {
  clearTimeout(State.lastNotifTimeout);
  notifEl.textContent = text;
  notifEl.classList.add('show');
  State.lastNotifTimeout = setTimeout(() => notifEl.classList.remove('show'), duration);
}

/* ──────────────────────────────────────────────────────────
   RACE CONTROL
────────────────────────────────────────────────────────── */
function startCountdown() {
  const el = document.getElementById('countdown');
  let count = 3;
  showNotification('');
  function tick() {
    el.textContent = count;
    if (sounds.beep) { sounds.beep.currentTime = 0; sounds.beep.play(); }
    el.classList.remove('show');
    void el.offsetWidth; // reflow
    el.classList.add('show');
    if (count > 0) {
      count--;
      setTimeout(tick, 900);
    } else {
      el.textContent = 'GO!';
      if (sounds.start) { sounds.start.play(); }
      playEngineLoop();
      el.style.color = '#00ffaa';
      void el.offsetWidth;
      el.classList.add('show');
      setTimeout(() => {
        el.classList.remove('show');
        el.style.color = '';
        State.phase = 'racing';
      }, 600);
    }
  }
  tick();
}

function finishRace() {
  State.phase = 'finished';
  stopEngineLoop();
  if (sounds.finish) sounds.finish.play();
  document.getElementById('hud').classList.add('hidden');

  const pos = calcPosition();
  document.getElementById('fin-pos').textContent  = ordinal(pos);
  document.getElementById('fin-time').textContent = formatTime(State.raceTime);
  document.getElementById('fin-best').textContent = formatTimeFull(State.bestLap);
  document.getElementById('fin-speed').textContent = `${Math.round(State.topSpeed)} km/h`;

  showScreen('finish-screen');
}

function startRace() {
  // Reset state
  State.raceTime   = 0;
  State.lapStartTime = 0;
  State.bestLap    = Infinity;
  State.topSpeed   = 0;
  State.wrongWay   = false;
  State.phase      = 'countdown';

  Player.speed = 0;
  Player.steer = 0;
  Player.lap   = 1;
  Player.t     = 0;
  Player.lastT = 0;

  const startPt = trackCurve.getPointAt(0);
  const tan = trackCurve.getTangentAt(0);
  Player.angle = Math.atan2(tan.x, tan.z);
  Player.car.position.set(startPt.x - 3, 0.01, startPt.z);
  Player.car.rotation.y = Player.angle;
  Player.car.rotation.z = 0;

  // Reset AI
  const frames = trackCurve.computeFrenetFrames(TRACK_DIVISIONS, true);
  AICars.forEach((ai, i) => {
    const startT = (i + 1) / (NUM_AI + 1) * 0.04 + 0.002;
    const pt = trackCurve.getPointAt(startT);
    const bn = frames.binormals[0];
    const tanA = trackCurve.getTangentAt(startT);
    ai.t = startT;
    ai.lap = 1;
    ai.speed = 0.05 * WORLD_SCALE;
    ai.car.position.set(pt.x + bn.x * ai.offset, 0.01, pt.z + bn.z * ai.offset);
    ai.angle = Math.atan2(tanA.x, tanA.z);
    ai.car.rotation.y = ai.angle;
  });

  hudBest.textContent = '--:--.--';
  hudLap.textContent  = `1 / ${TOTAL_LAPS}`;

  showScreen(null); // hide all screens
  document.getElementById('hud').classList.remove('hidden');

  setTimeout(() => startCountdown(), 200);
}

/* ──────────────────────────────────────────────────────────
   SCREEN MANAGEMENT
────────────────────────────────────────────────────────── */
function showScreen(id) {
  ['start-screen','pause-menu','finish-screen'].forEach(sid => {
    document.getElementById(sid).classList.toggle('hidden', sid !== id);
  });
}

/* ──────────────────────────────────────────────────────────
   GAME LOOP
────────────────────────────────────────────────────────── */
let lastTime = 0;
const MAX_DT = 0.05;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, MAX_DT);
  lastTime = timestamp;

  if (State.phase === 'racing') {
    State.raceTime += dt;
    updatePlayer(dt);
    updateAI(dt);
    updateParticles(dt);
    updateCamera(dt);
    updateHUD();
  } else if (State.phase === 'countdown') {
    updateCamera(dt);
    updateParticles(dt);
  }

  renderer.render(scene, camera);
}

/* ──────────────────────────────────────────────────────────
   INPUT HANDLING
────────────────────────────────────────────────────────── */
const keyMap = {
  'ArrowUp':'up', 'w':'up', 'W':'up',
  'ArrowDown':'down', 's':'down', 'S':'down',
  'ArrowLeft':'left', 'a':'left', 'A':'left',
  'ArrowRight':'right', 'd':'right', 'D':'right',
};

document.addEventListener('keydown', e => {
  if (keyMap[e.key]) { Keys[keyMap[e.key]] = true; e.preventDefault(); }
  if ((e.key === 'p' || e.key === 'P') && State.phase === 'racing') togglePause();
  if (e.key === 'Escape') {
    if (State.phase === 'racing') togglePause();
    else if (State.phase === 'paused') { State.phase = 'start'; showScreen('start-screen'); document.getElementById('hud').classList.add('hidden'); }
  }
});

document.addEventListener('keyup', e => {
  if (keyMap[e.key]) Keys[keyMap[e.key]] = false;
});

function togglePause() {
  if (State.phase === 'racing') {
    State.phase = 'paused';
    sounds.engine?.pause();
    showScreen('pause-menu');
  } else if (State.phase === 'paused') {
    State.phase = 'racing';
    sounds.engine?.play();
    showScreen(null);
  }
}

// Mobile controls
document.querySelectorAll('.mobile-btn').forEach(btn => {
  const key = btn.dataset.key;
  const k   = keyMap[key];
  btn.addEventListener('touchstart', e => { e.preventDefault(); if(k) Keys[k] = true; btn.classList.add('pressed'); }, { passive: false });
  btn.addEventListener('touchend',   e => { e.preventDefault(); if(k) Keys[k] = false; btn.classList.remove('pressed'); }, { passive: false });
  btn.addEventListener('mousedown',  () => { if(k) Keys[k] = true; });
  btn.addEventListener('mouseup',    () => { if(k) Keys[k] = false; });
});

// global click sound for UI widgets
document.body.addEventListener('click', e => {
  if (e.target.closest('.btn, .mobile-btn')) {
    playClickSound();
  }
});

// Button bindings
document.getElementById('btn-start').addEventListener('click', startRace);
document.getElementById('btn-resume').addEventListener('click', togglePause);
document.getElementById('btn-restart-pause').addEventListener('click', startRace);
document.getElementById('btn-menu-pause').addEventListener('click', () => {
  State.phase = 'start';
  showScreen('start-screen');
  document.getElementById('hud').classList.add('hidden');
  if (sounds.engine) sounds.engine.pause();
});
document.getElementById('btn-restart-finish').addEventListener('click', startRace);
document.getElementById('btn-menu-finish').addEventListener('click', () => {
  State.phase = 'start';
  showScreen('start-screen');
  document.getElementById('hud').classList.add('hidden');
  if (sounds.engine) sounds.engine.pause();
});

/* ──────────────────────────────────────────────────────────
   UTILITY: Closest point on curve (binary search)
────────────────────────────────────────────────────────── */
function getClosestT(pos) {
  let best = 0, bestDist = Infinity;
  const samples = 80;
  for (let i = 0; i < samples; i++) {
    const t = i / samples;
    const pt = trackCurve.getPoint(t);
    const d = pos.distanceToSquared(pt);
    if (d < bestDist) { bestDist = d; best = t; }
  }
  // Refine
  let lo = best - 1/samples, hi = best + 1/samples;
  for (let i = 0; i < 8; i++) {
    const mid = (lo + hi) / 2;
    const ptLo  = trackCurve.getPoint(((lo  % 1) + 1) % 1);
    const ptHi  = trackCurve.getPoint(((hi  % 1) + 1) % 1);
    const ptMid = trackCurve.getPoint(((mid % 1) + 1) % 1);
    if (pos.distanceToSquared(ptLo) < pos.distanceToSquared(ptHi)) hi = mid;
    else lo = mid;
  }
  return ((((lo + hi) / 2) % 1) + 1) % 1;
}

/* ──────────────────────────────────────────────────────────
   UTILITY: Seeded RNG (Mulberry32)
────────────────────────────────────────────────────────── */
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ──────────────────────────────────────────────────────────
   INIT
────────────────────────────────────────────────────────── */
function init() {
  buildScene();
  Player.init();
  initAI();
  initParticles();

  // Position camera initially on player
  const startPt = trackCurve.getPointAt(0);
  camera.position.set(startPt.x, 8, startPt.z - 15);
  camera.lookAt(startPt.x, 0, startPt.z);

  // Start loop
  requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(gameLoop); });

  // Transition loading → start
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hidden');
    State.phase = 'start';
    showScreen('start-screen');
  }, 1800);
}

init();
